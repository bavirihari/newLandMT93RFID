name: uhf_rfid_scanner
description: "Flutter plugin for UHF RFID handheld scanners. Supports NewLand MT93 and Urovo DT610. Features tag scanning, power control, and SGTIN-96 to EAN-13 decoding."
version: 3.0.0
repository: https://github.com/bavirihari/newLandMT93RFID
issue_tracker: https://github.com/bavirihari/newLandMT93RFID/issues
topics:
  - rfid
  - uhf
  - scanner
  - newland
  - hardware

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.baviri.uhfrfid
        pluginClass: RfidPlugin
